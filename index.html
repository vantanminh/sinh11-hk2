<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Ôn tập Sinh học 11</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <button
        class="tool-btn mobile-only mobile-menu-btn"
        id="openToolsBtn"
        type="button"
        aria-label="Mở menu chỉnh sâu"
        aria-expanded="false"
      >
        <span class="hamburger-icon" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
        </span>
      </button>
      <button
        class="tool-btn mobile-only mobile-palette-trigger"
        id="mobilePaletteBtn"
        type="button"
        aria-expanded="false"
      >
        Câu
      </button>
      <div class="titlebox">
        <div class="title" id="examTitle">Đang tải...</div>
        <div class="mobile-title" id="mobileExamTitle">Đang tải...</div>
        <div class="subtitle" id="examSection"></div>
      </div>

      <div class="tools-host" id="toolsDesktopMount">
      <div class="tools" id="toolsPanel">
        <div class="tools-sheet-head mobile-only">
          <div class="tools-sheet-title">Menu chỉnh sâu</div>
          <button class="tool-btn" id="closeToolsBtn" type="button">Đóng</button>
        </div>
        <button class="tool-btn mobile-only" id="openPaletteBtn" type="button">Câu</button>
        <div class="tool-field cs-field">
          <span class="tool-label">Chọn bài</span>
          <div class="cs" id="lessonSelect" data-value="">
            <button class="cs-trigger" type="button" aria-haspopup="listbox" aria-expanded="false">
              <span class="cs-value"></span>
              <svg class="cs-arrow" width="10" height="6" viewBox="0 0 10 6" fill="none" aria-hidden="true"><path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <div class="cs-list" role="listbox" hidden></div>
          </div>
        </div>
        <div class="tool-field mode-field cs-field">
          <span class="tool-label">Hiện đáp án</span>
          <div class="cs" id="revealModeSelect" data-value="submit">
            <button class="cs-trigger" type="button" aria-haspopup="listbox" aria-expanded="false">
              <span class="cs-value">Cuối bài</span>
              <svg class="cs-arrow" width="10" height="6" viewBox="0 0 10 6" fill="none" aria-hidden="true"><path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <div class="cs-list" role="listbox" hidden>
              <button class="cs-option selected" role="option" data-value="submit" type="button">Cuối bài</button>
              <button class="cs-option" role="option" data-value="instant" type="button">Chọn xong</button>
            </div>
          </div>
        </div>
        <button class="tool-btn accent" id="submitBtn" type="button">Nộp bài</button>
        <label class="toggle-chip" for="shuffleQuestionsToggle">
          <input id="shuffleQuestionsToggle" type="checkbox" />
          <span>Đảo câu</span>
        </label>
        <label class="toggle-chip" for="shuffleOptionsToggle">
          <input id="shuffleOptionsToggle" type="checkbox" />
          <span>Đảo đáp án</span>
        </label>
        <div class="summary" id="summary">0/0</div>
        <button class="tool-btn danger" id="resetBtn" type="button" title="Xóa toàn bộ lựa chọn">Làm lại</button>
      </div>
      </div>
    </header>

    <main class="main">
      <aside class="sidebar card">
        <div class="palette" id="paletteDesktop"></div>
      </aside>

      <section class="viewer card">
        <div class="viewer-head">
          <div class="viewer-head-left">
            <div class="q-position" id="qPosition">0/0</div>
            <div class="q-title-row">
              <div class="q-number" id="qNumber">Câu 1</div>
              <div class="q-type-badge" id="qTypeBadge" hidden>Trắc nghiệm</div>
            </div>
          </div>
          <div class="viewer-head-right">
            <div class="answer-chip" id="answerChip" hidden>Đáp án: A</div>
          </div>
        </div>

        <div class="viewer-body">
          <div class="prompt-pane" id="promptPane">
            <div class="question-text" id="questionText">Đang tải...</div>
            <div class="question-media" id="questionMedia" hidden></div>
          </div>
          <div class="answer-pane">
            <div class="options" id="options"></div>
          </div>
        </div>

        <div class="viewer-foot">
          <button class="nav-btn" id="prevBtn" type="button">←</button>
          <button class="nav-btn" id="clearBtn" type="button">Bỏ chọn</button>
          <button class="nav-btn" id="nextBtn" type="button">→</button>
        </div>
      </section>
    </main>
  </div>

  <div class="tools-backdrop" id="toolsBackdrop">
    <div class="tools-overlay-panel">
      <div class="tools-sheet-shell" id="toolsSheetShell"></div>
    </div>
  </div>

  <div class="overlay" id="overlay">
    <div class="overlay-panel">
      <div class="overlay-head">
        <div class="overlay-title">Chọn câu</div>
        <button class="tool-btn" id="closePaletteBtn" type="button">Đóng</button>
      </div>
      <div class="overlay-subtitle" id="paletteSummary"></div>
      <div class="palette mobile-palette" id="paletteMobile"></div>
    </div>
  </div>

  <div class="image-lightbox" id="imageLightbox" aria-hidden="true">
    <div class="image-lightbox-panel" id="imageLightboxPanel" role="dialog" aria-modal="true" aria-label="Xem ảnh lớn">
      <div class="image-lightbox-head">
        <div class="image-lightbox-meta" id="imageLightboxMeta">Ảnh 1/1</div>
        <button class="tool-btn image-lightbox-close" id="closeImageLightboxBtn" type="button">Đóng</button>
      </div>
      <div class="image-lightbox-stage">
        <button class="image-lightbox-nav" id="prevImageLightboxBtn" type="button" aria-label="Ảnh trước">←</button>
        <div class="image-lightbox-viewport" id="imageLightboxViewport">
          <img class="image-lightbox-image" id="imageLightboxImage" alt="" />
        </div>
        <button class="image-lightbox-nav" id="nextImageLightboxBtn" type="button" aria-label="Ảnh tiếp theo">→</button>
      </div>
      <div class="image-lightbox-caption" id="imageLightboxCaption" hidden></div>
      <div class="image-lightbox-hint" id="imageLightboxHint">Bấm vùng tối bên ngoài hoặc nhấn Esc để đóng</div>
    </div>
  </div>

  <script src="javascript.js"></script>
</body>
</html>
